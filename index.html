<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל סינון Webview | Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#8b5cf6',
                        success: '#10b981',
                        danger: '#ef4444'
                    },
                    fontFamily: { sans:['system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .ltr-text { direction: ltr; text-align: left; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans relative">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-darkBg flex flex-col items-center justify-center p-4">
        <div class="glass p-10 rounded-3xl max-w-md w-full text-center shadow-2xl relative z-10">
            <h1 class="text-3xl font-bold text-white mb-2">Webview Filter</h1>
            <p class="text-slate-400 mb-8">התחבר עם GitHub כדי לנהל את הרשימה הלבנה.</p>
            <button onclick="loginWithGitHub()" class="w-full bg-white hover:bg-slate-200 text-slate-900 font-bold px-6 py-4 rounded-xl flex items-center justify-center gap-3 smooth">
                <i class="ph-fill ph-github-logo text-2xl"></i> התחבר לגיטהאב
            </button>
        </div>
    </div>

    <!-- Loader Screen -->
    <div id="loaderScreen" class="fixed inset-0 z-[110] bg-darkBg/90 backdrop-blur-md hidden flex-col items-center justify-center">
        <div class="spinner mb-4 w-12 h-12 border-4"></div>
        <p id="loaderText" class="text-primary font-medium tracking-wide">טוען נתונים...</p>
    </div>

    <!-- Navbar -->
    <nav id="mainNav" class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-lg hidden opacity-0 smooth">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-white tracking-wide">Webview Filter Pro</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="saveIndicator" class="hidden items-center gap-2 text-sm text-yellow-400 bg-yellow-400/10 px-4 py-2 rounded-xl border border-yellow-400/20">
                <i class="ph-fill ph-warning-circle text-lg"></i> ישנם שינויים שלא נשמרו
            </div>
            <button onclick="saveToGitHub()" id="saveBtn" class="bg-primary hover:bg-blue-600 smooth text-white px-5 py-2.5 rounded-xl font-medium shadow-[0_0_15px_rgba(59,130,246,0.4)] flex items-center gap-2">
                <i class="ph ph-cloud-arrow-up text-xl"></i> שמור לגיטהאב
            </button>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 smooth text-slate-300 px-4 py-2.5 rounded-xl font-medium border border-slate-600">
                <i class="ph ph-sign-out text-xl"></i> התנתק
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent" class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 hidden opacity-0 smooth">
        
        <!-- Sidebar Tabs -->
        <aside class="lg:col-span-3 space-y-3">
            <button onclick="switchTab('global')" id="tab-global" class="w-full text-right px-5 py-4 rounded-2xl bg-primary/10 border border-primary/30 text-primary font-medium smooth flex items-center justify-between shadow-lg">
                <span class="flex items-center gap-3"><i class="ph ph-globe-hemisphere-east text-xl"></i> רשימה גלובלית</span>
            </button>
            <button onclick="switchTab('apps')" id="tab-apps" class="w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between">
                <span class="flex items-center gap-3"><i class="ph ph-app-window text-xl"></i> ניהול אפליקציות</span>
                <span id="appsCountBadge" class="bg-slate-800 text-slate-300 text-xs px-2.5 py-1 rounded-full font-bold">0</span>
            </button>
        </aside>

        <!-- Dynamic Area -->
        <section class="lg:col-span-9 glass rounded-3xl p-6 md:p-8 min-h-[70vh] shadow-2xl relative overflow-visible">
            
            <!-- Global Tab -->
            <div id="view-global" class="space-y-6 relative z-10">
                <header class="mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">רשימה גלובלית</h2>
                    <p class="text-slate-400">כתובות שיוגדרו כאן יהיו פתוחות עבור כל אפליקציה שמדיניותה <span class="text-blue-400 bg-blue-400/10 px-1 rounded">global</span>.</p>
                </header>
                <div class="relative group">
                    <input type="text" id="globalInput" placeholder="הוסף כתובת (למשל google.com) ולחץ Enter..." 
                           class="w-full bg-slate-900/50 border border-slate-700 focus:border-primary rounded-2xl px-5 py-4 text-white outline-none smooth ltr-text placeholder:text-right">
                    <button onclick="addGlobalDomain()" class="absolute left-2 top-2 bottom-2 bg-primary hover:bg-blue-600 text-white px-4 rounded-xl smooth flex items-center justify-center shadow-lg">
                        <i class="ph ph-plus text-xl"></i>
                    </button>
                </div>
                <div id="globalList" class="flex flex-wrap gap-3 mt-6"></div>
            </div>

            <!-- Apps Tab -->
            <div id="view-apps" class="hidden space-y-6 relative z-10">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-2">חוקי אפליקציות</h2>
                        <p class="text-slate-400">חפש להוספת אפליקציות מהחנות, או סנן את הרשימה הקיימת.</p>
                    </div>
                </header>

                <!-- Search Input + Dropdown -->
                <div class="relative z-50" id="searchContainer">
                    <i class="ph ph-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none"></i>
                    <input type="text" id="searchInput" onkeyup="handleSearchInput()" placeholder="חפש בחנות Play או סנן רשימה מקומית..." 
                           class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-2xl pr-12 pl-4 py-4 text-white outline-none smooth ltr-text placeholder:text-right shadow-inner">
                    
                    <!-- Google Search Results Dropdown -->
                    <div id="googleSearchResults" class="hidden absolute top-full left-0 right-0 mt-2 bg-cardBg border border-slate-700 rounded-2xl p-2 shadow-[0_10px_40px_rgba(0,0,0,0.5)] max-h-[350px] overflow-y-auto">
                        <!-- Results injected here -->
                    </div>
                </div>

                <div id="appsList" class="space-y-4 pt-6 mt-6 border-t border-slate-700/50">
                    <!-- Apps loaded here -->
                </div>
            </div>

        </section>
    </main>

    <!-- Modal for adding new app -->
    <div id="addAppModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full shadow-2xl border border-slate-700/50">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white">הגדרת אפליקציה</h3>
                <button onclick="closeAddAppModal()" class="text-slate-400 hover:text-white"><i class="ph ph-x text-2xl"></i></button>
            </div>
            
            <div class="flex items-center gap-4 mb-6 bg-slate-800/50 p-4 rounded-2xl">
                <img id="addAppModalIcon" src="" class="w-12 h-12 rounded-xl object-cover border border-slate-700 hidden">
                <div>
                    <div id="addAppModalTitle" class="font-bold text-white"></div>
                    <div id="addAppModalPkg" class="text-xs text-slate-400 ltr-text font-mono mt-1"></div>
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-sm font-medium text-slate-300">בחר מדיניות סינון:</label>
                <select id="addAppModalPolicy" class="w-full bg-slate-900 border border-slate-600 focus:border-primary rounded-xl px-4 py-3 text-white outline-none cursor-pointer">
                    <option value="blocked">חסום (Blocked)</option>
                    <option value="global" selected>גלובלי (Global) - מומלץ</option>
                    <option value="custom">מותאם (Custom)</option>
                    <option value="open">פתוח לגמרי (Open)</option>
                </select>
            </div>
            
            <div class="mt-8">
                <button onclick="confirmAddApp()" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl smooth shadow-lg flex justify-center items-center gap-2">
                    <i class="ph ph-check-circle text-xl"></i> הוסף לרשימה
                </button>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[300] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CONFIG = {
            GITHUB_USER: 'lilor159357',
            GITHUB_REPO: 'webview_whitelist',
            FILE_PATH: 'whitelist.json',
            ALLOWED_USERS:['lilor159357', 'chanuta159-design'],
            GITHUB_CLIENT_ID: 'Iv23liPvUSGjIkdCM9C7',
            GOOGLE_API_KEY: 'AIzaSyD3YjTEIwAnBBIV7LzuRcQVHmTTB27og9o', 
            SEARCH_ENGINE_ID: 'b769d79cff32c40de' 
        };

        const policies = {
            blocked: { name: 'חסום (Blocked)', colors: 'text-red-400 bg-red-400/10 border-red-400/20' },
            open: { name: 'פתוח (Open)', colors: 'text-green-400 bg-green-400/10 border-green-400/20' },
            global: { name: 'גלובלי (Global)', colors: 'text-blue-400 bg-blue-400/10 border-blue-400/20' },
            custom: { name: 'מותאם (Custom)', colors: 'text-purple-400 bg-purple-400/10 border-purple-400/20' }
        };

        let state = { global_whitelist:[], apps: {} };
        let fileSHA = null;
        let githubToken = null;
        let hasUnsavedChanges = false;
        let debounceTimer = null;

        const encodeUnicode = (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
        const decodeUnicode = (str) => decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));

        // ==========================================
        // UI COMPONENTS
        // ==========================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-success/20 border-success/30 text-emerald-400' : 'bg-danger/20 border-danger/30 text-red-400';
            const icon = type === 'success' ? 'ph-check-circle' : 'ph-warning-octagon';
            
            toast.className = `flex items-center gap-3 glass ${colors} px-5 py-3 rounded-2xl shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 border`;
            toast.innerHTML = `<i class="ph-fill ${icon} text-2xl"></i><span class="font-medium">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showLoader(text) {
            document.getElementById('loaderText').innerText = text;
            document.getElementById('loaderScreen').classList.remove('hidden');
            document.getElementById('loaderScreen').classList.add('flex');
        }

        function hideLoader() {
            document.getElementById('loaderScreen').classList.add('hidden');
            document.getElementById('loaderScreen').classList.remove('flex');
        }

        function triggerChange() {
            hasUnsavedChanges = true;
            document.getElementById('saveIndicator').classList.remove('hidden');
            document.getElementById('saveIndicator').classList.add('flex');
            document.getElementById('saveBtn').classList.add('animate-pulse');
        }

        // ==========================================
        // GITHUB API
        // ==========================================
        function loginWithGitHub() {
            window.location.href = `https://github.com/login/oauth/authorize?client_id=${CONFIG.GITHUB_CLIENT_ID}&scope=repo`;
        }

        function logout() {
            if(hasUnsavedChanges && !confirm('ישנם שינויים שלא נשמרו. בטוח שברצונך להתנתק?')) return;
            localStorage.removeItem('gh_token');
            window.location.href = window.location.pathname;
        }

        async function handleOAuthCallback(code) {
            showLoader('מאמת מול GitHub...');
            try {
                const res = await fetch(`/api/github-callback?code=${code}`);
                if (!res.ok) throw new Error('שגיאה בקבלת טוקן');
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('gh_token', data.token);
                    window.location.href = window.location.pathname;
                } else {
                    throw new Error('טוקן חסר');
                }
            } catch (error) {
                hideLoader();
                alert(`שגיאה: ${error.message}`);
            }
        }

        async function loadFromGitHub() {
            showLoader('טוען הגדרות...');
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.FILE_PATH}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    fileSHA = data.sha;
                    state = JSON.parse(decodeUnicode(data.content));
                } else if (res.status === 404) {
                    state = { global_whitelist:[], apps: {} };
                } else {
                    throw new Error('שגיאה במשיכת קובץ');
                }
                
                if(!state.global_whitelist) state.global_whitelist =[];
                if(!state.apps) state.apps = {};

                renderGlobal();
                renderApps();
                hideLoader();
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden', 'opacity-0');
                document.getElementById('mainContent').classList.remove('hidden', 'opacity-0');

            } catch (err) {
                hideLoader();
                showToast(err.message, 'error');
            }
        }

        async function saveToGitHub() {
            if (!hasUnsavedChanges) return showToast('אין שינויים לשמור.', 'success');
            showLoader('שומר שינויים ל-GitHub...');
            
            const jsonString = JSON.stringify(state, null, 2);
            const body = { message: 'Update via Webview UI', content: encodeUnicode(jsonString) };
            if (fileSHA) body.sha = fileSHA;

            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                fileSHA = data.content.sha;
                hasUnsavedChanges = false;
                document.getElementById('saveIndicator').classList.add('hidden');
                document.getElementById('saveIndicator').classList.remove('flex');
                document.getElementById('saveBtn').classList.remove('animate-pulse');
                hideLoader();
                showToast('נשמר בהצלחה ב-GitHub! 🎉', 'success');

            } catch (err) {
                hideLoader();
                showToast(`שגיאה: ${err.message}`, 'error');
            }
        }

        // ==========================================
        // APP RENDERING
        // ==========================================
        function switchTab(tab) {
            document.getElementById('view-global').classList.add('hidden');
            document.getElementById('view-apps').classList.add('hidden');
            document.getElementById('tab-global').className = "w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between";
            document.getElementById('tab-apps').className = "w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between";
            
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "w-full text-right px-5 py-4 rounded-2xl bg-primary/10 border border-primary/30 text-primary font-medium smooth flex items-center justify-between shadow-lg";
        }

        function renderGlobal() {
            const list = document.getElementById('globalList');
            list.innerHTML = state.global_whitelist.map((domain, index) => `
                <div class="flex items-center gap-2 bg-slate-800/80 border border-slate-600/50 hover:border-slate-500 px-4 py-2 rounded-xl group smooth cursor-default shadow-sm">
                    <span class="text-sm font-medium tracking-wide ltr-text">${domain}</span>
                    <button onclick="removeGlobal(${index})" class="text-slate-500 hover:text-red-400 ml-2 outline-none">
                        <i class="ph-fill ph-x-circle text-lg"></i>
                    </button>
                </div>
            `).join('');
        }

        function addGlobalDomain() {
            const input = document.getElementById('globalInput');
            const val = input.value.trim().toLowerCase();
            if (val && !state.global_whitelist.includes(val)) {
                state.global_whitelist.push(val);
                input.value = '';
                triggerChange();
                renderGlobal();
            }
        }

        function removeGlobal(index) {
            state.global_whitelist.splice(index, 1);
            triggerChange();
            renderGlobal();
        }

        function renderApps(filterText = '') {
            const list = document.getElementById('appsList');
            const appKeys = Object.keys(state.apps);
            document.getElementById('appsCountBadge').innerText = appKeys.length;

            let html = '';
            appKeys.forEach(pkg => {
                const app = state.apps[pkg];
                const customMatch = app.custom_whitelist?.some(domain => domain.includes(filterText.toLowerCase()));
                const nameMatch = app.name?.toLowerCase().includes(filterText.toLowerCase());
                
                // תמיכה בחיפוש חכם גם לפי שם האפליקציה וגם לפי החבילה
                if (filterText && !pkg.toLowerCase().includes(filterText.toLowerCase()) && !customMatch && !nameMatch) return;
                
                const isCustom = app.policy === 'custom';
                const displayName = app.name || pkg;
                const packageSubtitle = app.name ? pkg : 'Package ID';
                
                // הצגת אייקון מותאם אישית או לוגו ברירת מחדל של אנדרואיד
                const displayIcon = app.icon 
                    ? `<img src="${app.icon}" class="w-12 h-12 rounded-xl object-cover border border-slate-700 shadow-inner">` 
                    : `<div class="h-12 w-12 bg-slate-900 rounded-xl border border-slate-700 flex items-center justify-center group-hover:border-slate-500 smooth shadow-inner"><i class="ph ph-android-logo text-2xl text-slate-400"></i></div>`;
                
                html += `
                <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 hover:bg-slate-800/60 smooth group">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex items-center gap-4">
                            ${displayIcon}
                            <div>
                                <h3 class="font-bold text-white ltr-text text-base">${displayName}</h3>
                                <p class="text-xs text-slate-500 mt-0.5 ltr-text font-mono">${packageSubtitle}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <select onchange="changePolicy('${pkg}', this.value)" 
                                    class="bg-slate-900 border ${policies[app.policy].colors.split(' ')[2]} ${policies[app.policy].colors.split(' ')[0]} text-sm rounded-xl px-4 py-2.5 outline-none cursor-pointer appearance-none text-center font-medium shadow-sm">
                                <option value="blocked" ${app.policy === 'blocked' ? 'selected' : ''}>${policies.blocked.name}</option>
                                <option value="open" ${app.policy === 'open' ? 'selected' : ''}>${policies.open.name}</option>
                                <option value="global" ${app.policy === 'global' ? 'selected' : ''}>${policies.global.name}</option>
                                <option value="custom" ${app.policy === 'custom' ? 'selected' : ''}>${policies.custom.name}</option>
                            </select>
                            <button onclick="removeApp('${pkg}')" class="h-10 w-10 bg-slate-900 hover:bg-red-500/10 border border-slate-700 hover:border-red-500/30 text-slate-400 hover:text-red-400 rounded-xl flex items-center justify-center smooth outline-none">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    ${isCustom ? `
                    <div class="mt-5 pt-5 border-t border-slate-700/50">
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(app.custom_whitelist ||[]).map((domain, idx) => `
                                <div class="flex items-center gap-1.5 bg-purple-500/10 border border-purple-500/20 text-purple-200 px-3 py-1.5 rounded-lg text-sm ltr-text">
                                    ${domain}
                                    <button onclick="removeCustomDomain('${pkg}', ${idx})" class="text-purple-400 hover:text-white ml-1"><i class="ph ph-x"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2 relative">
                            <input type="text" id="customInput-${pkg.replace(/\./g, '-')}" placeholder="הוסף כתובת ל-Custom Whitelist..." 
                                   class="flex-grow bg-slate-900 border border-slate-700 focus:border-purple-500 rounded-xl px-4 py-2 text-sm text-white outline-none smooth ltr-text placeholder:text-right"
                                   onkeypress="if(event.key === 'Enter') addCustomDomain('${pkg}')">
                            <button onclick="addCustomDomain('${pkg}')" class="bg-slate-700 hover:bg-purple-600 text-white px-4 py-2 rounded-xl text-sm font-medium smooth">הוסף</button>
                        </div>
                    </div>
                    ` : ''}
                </div>`;
            });
            
            if(!html) html = `<div class="text-center py-10 text-slate-500">לא נמצאו תוצאות ברשימה המקומית.</div>`;
            list.innerHTML = html;
        }

        // ==========================================
        // GOOGLE SEARCH INTEGRATION
        // ==========================================
        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.trim();
            renderApps(query); 

            const resultsDiv = document.getElementById('googleSearchResults');
            clearTimeout(debounceTimer);
            
            if (query.length < 3) {
                resultsDiv.classList.add('hidden');
                return;
            }
            
            debounceTimer = setTimeout(() => searchGoogleForApps(query), 500);
        }

        async function searchGoogleForApps(query) {
            const resultsDiv = document.getElementById('googleSearchResults');
            resultsDiv.innerHTML = `<div class="p-4 text-center text-slate-400 flex items-center justify-center gap-3"><div class="spinner w-5 h-5"></div><span>מחפש ב-Google Play...</span></div>`;
            resultsDiv.classList.remove('hidden');

            const url = `https://www.googleapis.com/customsearch/v1?key=${CONFIG.GOOGLE_API_KEY}&cx=${CONFIG.SEARCH_ENGINE_ID}&q=${encodeURIComponent(query)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.items && data.items.length > 0) {
                    displayGoogleResults(data.items);
                } else {
                    resultsDiv.innerHTML = `<div class="p-4 text-center text-slate-500 text-sm">לא נמצאו אפליקציות חדשות בחנות Play. <button onclick="promptAddAppManual('${query}')" class="text-primary hover:underline block mt-2">הוסף ידנית את '${query}'</button></div>`;
                }
            } catch (err) {
                resultsDiv.innerHTML = `<div class="p-4 text-center text-red-400">שגיאה בחיפוש מול גוגל.</div>`;
            }
        }

        function displayGoogleResults(items) {
            const resultsDiv = document.getElementById('googleSearchResults');
            let resultsHTML = '';
            
            items.forEach(app => {
                try {
                    const url = new URL(app.link);
                    const pkgId = url.searchParams.get('id');
                    if (!pkgId) return; 
                    
                    const title = app.title.split(' - ')[0].split(' – ')[0].trim();
                    const icon = app.pagemap?.cse_image?.[0]?.src || ''; 

                    resultsHTML += `
                    <div class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-800 smooth cursor-pointer border-b border-slate-700/50 last:border-0"
                         onclick="promptAddApp('${pkgId}', '${title.replace(/'/g, "\\'")}', '${icon}')">
                        <div class="flex items-center gap-4">
                            ${icon ? `<img src="${icon}" class="w-10 h-10 rounded-lg object-cover">` : `<div class="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center"><i class="ph ph-android-logo text-slate-400"></i></div>`}
                            <div>
                                <div class="font-medium text-white">${title}</div>
                                <div class="text-xs text-slate-400 ltr-text font-mono">${pkgId}</div>
                            </div>
                        </div>
                        <div class="h-8 w-8 bg-primary/20 text-primary rounded-lg flex items-center justify-center hover:bg-primary hover:text-white smooth">
                            <i class="ph ph-plus text-lg"></i>
                        </div>
                    </div>`;
                } catch (e) { }
            });

            resultsDiv.innerHTML = resultsHTML || `<div class="p-4 text-center text-slate-500">לא נמצאו אפליקציות תקינות.</div>`;
        }

        document.addEventListener('click', (e) => {
            const container = document.getElementById('searchContainer');
            if (!container.contains(e.target)) {
                document.getElementById('googleSearchResults').classList.add('hidden');
            }
        });

        // ==========================================
        // ADD APP MODAL LOGIC (UPDATED)
        // ==========================================
        function promptAddAppManual(pkg) {
            promptAddApp(pkg, 'אפליקציה מותאמת אישית', '');
        }

        function promptAddApp(pkg, title, iconUrl) {
            if (state.apps[pkg]) {
                return showToast(`האפליקציה כבר קיימת ברשימה!`, 'error');
            }
            
            const modal = document.getElementById('addAppModal');
            // שומרים את הנתונים על המודל כדי להשתמש בהם בעת האישור
            modal.dataset.pkg = pkg;
            modal.dataset.appName = title;
            modal.dataset.appIcon = iconUrl;
            
            document.getElementById('addAppModalTitle').innerText = title;
            document.getElementById('addAppModalPkg').innerText = pkg;
            
            const iconImg = document.getElementById('addAppModalIcon');
            if (iconUrl) {
                iconImg.src = iconUrl;
                iconImg.classList.remove('hidden');
            } else {
                iconImg.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('googleSearchResults').classList.add('hidden');
        }

        function closeAddAppModal() {
            const modal = document.getElementById('addAppModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function confirmAddApp() {
            const modal = document.getElementById('addAppModal');
            const pkg = modal.dataset.pkg;
            const appName = modal.dataset.appName;
            const appIcon = modal.dataset.appIcon;
            const policy = document.getElementById('addAppModalPolicy').value;

            // יצירת האובייקט והשמת המדיניות
            state.apps[pkg] = { policy: policy };
            
            // השמת שם ואייקון אם קיימים (ולא אפליקציה ידנית רגילה)
            if (appName && appName !== 'אפליקציה מותאמת אישית') state.apps[pkg].name = appName;
            if (appIcon) state.apps[pkg].icon = appIcon;

            if (policy === 'custom') state.apps[pkg].custom_whitelist =[];

            triggerChange();
            renderApps();
            closeAddAppModal();

            document.getElementById('searchInput').value = '';
            showToast(`האפליקציה נוספה בהצלחה!`, 'success');
        }

        // ==========================================
        // DATA MUTATIONS
        // ==========================================
        function removeApp(pkg) {
            if(confirm(`האם אתה בטוח שברצונך למחוק את החוקים של ${pkg}?`)) {
                delete state.apps[pkg];
                triggerChange();
                renderApps();
            }
        }

        function changePolicy(pkg, newPolicy) {
            // שומרים על המידע הקיים (שם ואייקון)
            const appName = state.apps[pkg].name;
            const appIcon = state.apps[pkg].icon;
            
            state.apps[pkg].policy = newPolicy;
            if (newPolicy === 'custom' && !state.apps[pkg].custom_whitelist) {
                state.apps[pkg].custom_whitelist =[];
            } else if (newPolicy !== 'custom') {
                delete state.apps[pkg].custom_whitelist;
            }
            triggerChange();
            renderApps();
        }

        function addCustomDomain(pkg) {
            const input = document.getElementById(`customInput-${pkg.replace(/\./g, '-')}`);
            const val = input.value.trim().toLowerCase();
            if (val && !state.apps[pkg].custom_whitelist.includes(val)) {
                state.apps[pkg].custom_whitelist.push(val);
                triggerChange();
                renderApps();
            }
        }

        function removeCustomDomain(pkg, index) {
            state.apps[pkg].custom_whitelist.splice(index, 1);
            triggerChange();
            renderApps();
        }

        // ==========================================
        // INIT
        // ==========================================
        document.getElementById('globalInput').addEventListener('keypress', e => { if (e.key === 'Enter') addGlobalDomain(); });

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                await handleOAuthCallback(code);
            } else {
                githubToken = localStorage.getItem('gh_token');
                if (githubToken) loadFromGitHub();
            }
        };

        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges) { e.preventDefault(); e.returnValue = ''; }
        });
    </script>
</body>
</html>
