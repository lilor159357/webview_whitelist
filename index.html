<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל סינון Webview | מודרני</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons (מודרניים ויפים) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- הגדרות עיצוב מותאמות אישית -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#8b5cf6',
                        success: '#10b981',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans:['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .smooth { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* סקרולבר מודרני */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* הגדרות כיווניות טקסט אנגלי */
        .ltr-text { direction: ltr; text-align: left; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Navbar / Header -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <div class="bg-primary/20 p-2 rounded-xl text-primary">
                <i class="ph-fill ph-shield-check text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">Webview Filter Pro</h1>
                <p class="text-xs text-slate-400">ניהול רשימה לבנה - עריכת JSON</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="saveIndicator" class="hidden flex items-center gap-2 text-sm text-yellow-400 bg-yellow-400/10 px-3 py-1.5 rounded-full border border-yellow-400/20">
                <i class="ph ph-warning-circle text-lg"></i>
                <span>ישנם שינויים שלא נשמרו</span>
            </div>
            <button onclick="exportJSON()" class="bg-primary hover:bg-blue-600 smooth text-white px-5 py-2.5 rounded-xl font-medium shadow-[0_0_15px_rgba(59,130,246,0.4)] flex items-center gap-2">
                <i class="ph ph-code text-lg"></i> הצג JSON
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- תפריט צד (Tabs) -->
        <aside class="lg:col-span-3 space-y-3">
            <button onclick="switchTab('global')" id="tab-global" class="w-full text-right px-5 py-4 rounded-2xl bg-primary/10 border border-primary/30 text-primary font-medium smooth flex items-center justify-between shadow-lg">
                <span class="flex items-center gap-3"><i class="ph ph-globe-hemisphere-east text-xl"></i> רשימה גלובלית</span>
                <span id="globalCountBadge" class="bg-primary/20 text-primary text-xs px-2.5 py-1 rounded-full font-bold">0</span>
            </button>
            <button onclick="switchTab('apps')" id="tab-apps" class="w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between">
                <span class="flex items-center gap-3"><i class="ph ph-app-window text-xl"></i> ניהול אפליקציות</span>
                <span id="appsCountBadge" class="bg-slate-800 text-slate-300 text-xs px-2.5 py-1 rounded-full font-bold">0</span>
            </button>
        </aside>

        <!-- אזור עבודה (Content) -->
        <section class="lg:col-span-9 glass rounded-3xl p-6 md:p-8 min-h-[70vh] shadow-2xl relative overflow-hidden">
            
            <!-- עיגול רקע עיצובי -->
            <div class="absolute -top-32 -left-32 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>

            <!-- Tab: Global Whitelist -->
            <div id="view-global" class="space-y-6 relative z-10">
                <header class="mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">רשימה גלובלית</h2>
                    <p class="text-slate-400">כתובות שיוגדרו כאן יהיו פתוחות עבור כל אפליקציה שהמדיניות שלה היא <span class="text-blue-400 bg-blue-400/10 px-1 rounded">global</span>.</p>
                </header>
                
                <div class="relative group">
                    <input type="text" id="globalInput" placeholder="הוסף כתובת (למשל google.com) ולחץ Enter..." 
                           class="w-full bg-slate-900/50 border border-slate-700 group-hover:border-slate-500 focus:border-primary focus:ring-1 focus:ring-primary rounded-2xl px-5 py-4 text-white outline-none smooth ltr-text placeholder:text-right">
                    <button onclick="addGlobalDomain()" class="absolute left-2 top-2 bottom-2 bg-primary hover:bg-blue-600 text-white px-4 rounded-xl smooth flex items-center justify-center shadow-lg">
                        <i class="ph ph-plus text-xl"></i>
                    </button>
                </div>

                <div id="globalList" class="flex flex-wrap gap-3 mt-6">
                    <!-- Global domains will load here -->
                </div>
            </div>

            <!-- Tab: Apps Management -->
            <div id="view-apps" class="hidden space-y-6 relative z-10">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-2">חוקי אפליקציות</h2>
                        <p class="text-slate-400">הגדר הרשאות לכל אפליקציה בנפרד (Package Name).</p>
                    </div>
                    <button onclick="toggleAddAppForm()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium smooth flex items-center gap-2 shadow-lg">
                        <i class="ph ph-plus-circle text-lg text-accent"></i> אפליקציה חדשה
                    </button>
                </header>

                <!-- טופס הוספת אפליקציה (מוסתר כברירת מחדל) -->
                <div id="addAppForm" class="hidden bg-slate-900/80 border border-slate-700 p-5 rounded-2xl mb-6 smooth">
                    <div class="flex flex-col md:flex-row gap-3">
                        <input type="text" id="newAppPackage" placeholder="com.example.app..." class="flex-grow bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-white outline-none focus:border-accent ltr-text placeholder:text-right">
                        <select id="newAppPolicy" class="bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-white outline-none cursor-pointer">
                            <option value="blocked">חסום (Blocked)</option>
                            <option value="open">פתוח (Open)</option>
                            <option value="global">גלובלי (Global)</option>
                            <option value="custom">מותאם (Custom)</option>
                        </select>
                        <button onclick="addNewApp()" class="bg-accent hover:bg-purple-600 text-white px-6 py-2 rounded-xl smooth">הוסף</button>
                    </div>
                </div>

                <!-- חיפוש אפליקציות -->
                <div class="relative mb-6">
                    <i class="ph ph-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                    <input type="text" id="searchInput" onkeyup="filterApps()" placeholder="חפש אפליקציה..." 
                           class="w-full bg-slate-900/30 border border-slate-700/50 focus:border-slate-500 rounded-2xl pr-12 pl-4 py-3 text-white outline-none smooth ltr-text placeholder:text-right">
                </div>

                <div id="appsList" class="space-y-4">
                    <!-- Apps will load here -->
                </div>
            </div>

        </section>
    </main>

    <!-- Modal for showing JSON -->
    <div id="jsonModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        <div class="bg-cardBg border border-slate-700 rounded-3xl w-full max-w-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-lg font-bold">הקוד המעודכן (whitelist.json)</h3>
                <button onclick="closeJSON()" class="text-slate-400 hover:text-white"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow relative ltr-text">
                <button onclick="copyJSON()" class="absolute top-6 right-6 bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 smooth">
                    <i class="ph ph-copy"></i> העתק
                </button>
                <pre id="jsonOutput" class="text-sm text-green-400 font-mono bg-[#0d1117] p-4 rounded-xl overflow-x-auto"></pre>
            </div>
        </div>
    </div>

    <!-- הלוגיקה (JavaScript) -->
    <script>
        // --- 1. המידע שלנו (State) מבוסס על ה-JSON שלך ---
        let state = {
            global_whitelist: [
                "google.com",
                "waze.com"
            ],
            apps: {
                "com.example.blocked_app": { policy: "blocked" },
                "com.tranzmate": { policy: "open" },
                "com.waze": { policy: "blocked" },
                "com.example.custom_app": {
                    policy: "custom",
                    custom_whitelist: ["myspecial-api.com", "private-server.net"]
                }
            }
        };

        // --- 2. צבעים ותוויות למצבים (Policies) ---
        const policies = {
            blocked: { name: 'חסום (Blocked)', colors: 'text-red-400 bg-red-400/10 border-red-400/20' },
            open: { name: 'פתוח (Open)', colors: 'text-green-400 bg-green-400/10 border-green-400/20' },
            global: { name: 'גלובלי (Global)', colors: 'text-blue-400 bg-blue-400/10 border-blue-400/20' },
            custom: { name: 'מותאם (Custom)', colors: 'text-purple-400 bg-purple-400/10 border-purple-400/20' }
        };

        // --- 3. ניהול מעבר בין טאבים ---
        function switchTab(tab) {
            document.getElementById('view-global').classList.add('hidden');
            document.getElementById('view-apps').classList.add('hidden');
            
            document.getElementById('tab-global').className = "w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between";
            document.getElementById('tab-apps').className = "w-full text-right px-5 py-4 rounded-2xl bg-transparent hover:bg-slate-800 border border-transparent text-slate-400 hover:text-white smooth flex items-center justify-between";
            
            // Activate selected
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            const activeTab = document.getElementById(`tab-${tab}`);
            activeTab.className = "w-full text-right px-5 py-4 rounded-2xl bg-primary/10 border border-primary/30 text-primary font-medium smooth flex items-center justify-between shadow-lg";
        }

        // --- 4. רינדור רשימה גלובלית ---
        function renderGlobal() {
            const list = document.getElementById('globalList');
            document.getElementById('globalCountBadge').innerText = state.global_whitelist.length;
            
            list.innerHTML = state.global_whitelist.map((domain, index) => `
                <div class="flex items-center gap-2 bg-slate-800/80 border border-slate-600/50 hover:border-slate-500 px-4 py-2 rounded-xl group smooth cursor-default shadow-sm">
                    <span class="text-sm font-medium tracking-wide ltr-text">${domain}</span>
                    <button onclick="removeGlobal(${index})" class="text-slate-500 hover:text-red-400 ml-2 outline-none">
                        <i class="ph-fill ph-x-circle text-lg"></i>
                    </button>
                </div>
            `).join('');
        }

        function addGlobalDomain() {
            const input = document.getElementById('globalInput');
            const val = input.value.trim().toLowerCase();
            if (val && !state.global_whitelist.includes(val)) {
                state.global_whitelist.push(val);
                input.value = '';
                triggerChange();
                renderGlobal();
            }
        }

        function removeGlobal(index) {
            state.global_whitelist.splice(index, 1);
            triggerChange();
            renderGlobal();
        }

        document.getElementById('globalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addGlobalDomain();
        });

        // --- 5. רינדור אפליקציות ---
        function renderApps(filterText = '') {
            const list = document.getElementById('appsList');
            const appKeys = Object.keys(state.apps);
            document.getElementById('appsCountBadge').innerText = appKeys.length;

            let html = '';
            appKeys.forEach(pkg => {
                if (filterText && !pkg.toLowerCase().includes(filterText.toLowerCase())) return;
                
                const app = state.apps[pkg];
                const isCustom = app.policy === 'custom';
                
                html += `
                <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 hover:bg-slate-800/60 smooth group">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 bg-slate-900 rounded-xl border border-slate-700 flex items-center justify-center group-hover:border-slate-500 smooth shadow-inner">
                                <i class="ph ph-android-logo text-2xl text-slate-400"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white ltr-text text-base">${pkg}</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Package ID</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-3">
                            <select onchange="changePolicy('${pkg}', this.value)" 
                                    class="bg-slate-900 border ${policies[app.policy].colors.split(' ')[2]} ${policies[app.policy].colors.split(' ')[0]} text-sm rounded-xl px-4 py-2.5 outline-none cursor-pointer appearance-none text-center font-medium shadow-sm">
                                <option value="blocked" ${app.policy === 'blocked' ? 'selected' : ''}>${policies.blocked.name}</option>
                                <option value="open" ${app.policy === 'open' ? 'selected' : ''}>${policies.open.name}</option>
                                <option value="global" ${app.policy === 'global' ? 'selected' : ''}>${policies.global.name}</option>
                                <option value="custom" ${app.policy === 'custom' ? 'selected' : ''}>${policies.custom.name}</option>
                            </select>
                            
                            <button onclick="removeApp('${pkg}')" class="h-10 w-10 bg-slate-900 hover:bg-red-500/10 border border-slate-700 hover:border-red-500/30 text-slate-400 hover:text-red-400 rounded-xl flex items-center justify-center smooth outline-none">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    ${isCustom ? `
                    <div class="mt-5 pt-5 border-t border-slate-700/50">
                        <div class="flex items-center gap-2 mb-3">
                            <i class="ph-fill ph-lock-key text-purple-400"></i>
                            <span class="text-sm font-medium text-purple-300">כתובות מורשות (Custom Whitelist)</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(app.custom_whitelist ||[]).map((domain, idx) => `
                                <div class="flex items-center gap-1.5 bg-purple-500/10 border border-purple-500/20 text-purple-200 px-3 py-1.5 rounded-lg text-sm ltr-text">
                                    ${domain}
                                    <button onclick="removeCustomDomain('${pkg}', ${idx})" class="text-purple-400 hover:text-white ml-1"><i class="ph ph-x"></i></button>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex gap-2 relative">
                            <input type="text" id="customInput-${pkg.replace(/\./g, '-')}" placeholder="הוסף כתובת (למשל api.server.com)..." 
                                   class="flex-grow bg-slate-900 border border-slate-700 focus:border-purple-500 rounded-xl px-4 py-2 text-sm text-white outline-none smooth ltr-text placeholder:text-right"
                                   onkeypress="if(event.key === 'Enter') addCustomDomain('${pkg}')">
                            <button onclick="addCustomDomain('${pkg}')" class="bg-slate-700 hover:bg-purple-600 text-white px-4 py-2 rounded-xl text-sm font-medium smooth">הוסף</button>
                        </div>
                    </div>
                    ` : ''}
                </div>
                `;
            });
            
            if(!html) html = `<div class="text-center py-10 text-slate-500">לא נמצאו אפליקציות...</div>`;
            list.innerHTML = html;
        }

        // --- 6. פעולות רמת האפליקציה ---
        function filterApps() {
            renderApps(document.getElementById('searchInput').value);
        }

        function toggleAddAppForm() {
            const form = document.getElementById('addAppForm');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) document.getElementById('newAppPackage').focus();
        }

        function addNewApp() {
            const pkg = document.getElementById('newAppPackage').value.trim();
            const policy = document.getElementById('newAppPolicy').value;
            
            if (!pkg) return alert('נא להזין Package Name');
            if (state.apps[pkg]) return alert('אפליקציה זו כבר קיימת ברשימה!');

            state.apps[pkg] = { policy: policy };
            if (policy === 'custom') state.apps[pkg].custom_whitelist =[];
            
            document.getElementById('newAppPackage').value = '';
            toggleAddAppForm();
            triggerChange();
            renderApps();
        }

        function removeApp(pkg) {
            if(confirm(`האם אתה בטוח שברצונך למחוק את ${pkg}?`)) {
                delete state.apps[pkg];
                triggerChange();
                renderApps();
            }
        }

        function changePolicy(pkg, newPolicy) {
            state.apps[pkg].policy = newPolicy;
            if (newPolicy === 'custom' && !state.apps[pkg].custom_whitelist) {
                state.apps[pkg].custom_whitelist =[];
            } else if (newPolicy !== 'custom') {
                delete state.apps[pkg].custom_whitelist; // ננקה כדי לא לנפח את ה-JSON סתם
            }
            triggerChange();
            renderApps();
        }

        function addCustomDomain(pkg) {
            const inputId = `customInput-${pkg.replace(/\./g, '-')}`;
            const input = document.getElementById(inputId);
            const val = input.value.trim().toLowerCase();
            
            if (val && !state.apps[pkg].custom_whitelist.includes(val)) {
                state.apps[pkg].custom_whitelist.push(val);
                triggerChange();
                renderApps();
            }
        }

        function removeCustomDomain(pkg, index) {
            state.apps[pkg].custom_whitelist.splice(index, 1);
            triggerChange();
            renderApps();
        }

        // --- 7. ניהול שינויים ותצוגת JSON ---
        function triggerChange() {
            document.getElementById('saveIndicator').classList.remove('hidden');
            document.getElementById('saveIndicator').classList.add('flex');
        }

        function exportJSON() {
            const jsonStr = JSON.stringify(state, null, 2);
            document.getElementById('jsonOutput').textContent = jsonStr;
            document.getElementById('jsonModal').classList.remove('hidden');
            document.getElementById('jsonModal').classList.add('flex');
        }

        function closeJSON() {
            document.getElementById('jsonModal').classList.add('hidden');
            document.getElementById('jsonModal').classList.remove('flex');
        }

        function copyJSON() {
            const jsonStr = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert('הקוד הועתק בהצלחה! אפשר להדביק ב-GitHub.');
            });
        }

        // אתחול התחלתי
        window.onload = () => {
            renderGlobal();
            renderApps();
        };

    </script>
</body>
</html>
